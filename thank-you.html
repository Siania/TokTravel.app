<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon-20260417.ico" sizes="any" />
  <link rel="shortcut icon" href="favicon-20260417.ico" />
  <link rel="icon" type="image/png" href="assets/favicon-20260417.png" />
  <link rel="apple-touch-icon" href="assets/favicon-20260417.png" />
  <title>Thank you — TokTravel</title>
  <meta name="description" content="You are on the TokTravel waitlist." />
  <style>
    :root {
      --sand: #f5efe3;
      --paper: #fbf7ee;
      --ink: #2b241b;
      --muted: #6d6358;
      --coral: #ff5a36;
      --coral-dark: #e84a2f;
      --line: rgba(43, 36, 27, 0.12);
      --card: rgba(251, 247, 238, 0.94);
      --shadow: 0 20px 46px rgba(89, 63, 34, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 182, 38, 0.2) 0%, rgba(255, 182, 38, 0) 40%),
        radial-gradient(circle at 80% 78%, rgba(59, 156, 201, 0.2) 0%, rgba(59, 156, 201, 0) 45%),
        linear-gradient(180deg, var(--paper) 0%, var(--sand) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      width: min(560px, 92vw);
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 0;
    }

    header {
      padding: 24px 0 0;
      text-align: center;
    }

    .brand {
      font-size: 31px;
      font-weight: 750;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--ink);
    }

    .brand span {
      color: var(--coral);
    }

    .card {
      margin-top: 28px;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
      font-style: italic;
      font-weight: 600;
      font-size: clamp(28px, 5vw, 38px);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }

    .btn {
      margin-top: 28px;
      border: 0;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 16px;
      font-weight: 650;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: linear-gradient(135deg, var(--coral), var(--coral-dark));
      box-shadow: 0 10px 20px rgba(232, 74, 47, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <header class="wrap" style="padding-bottom: 0;">
    <a href="index.html" class="brand">Tok<span>Travel</span></a>
  </header>

  <main class="wrap">
    <section class="card">
      <h1>You’re on the list</h1>
      <p>
        Thanks for leaving your email. We’ll notify you when TokTravel takes off.
      </p>
      <a class="btn" href="index.html">Back to home</a>
    </section>
  </main>
</body>
</html>
